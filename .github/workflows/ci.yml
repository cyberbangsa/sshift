name: CI

# Runs on every pull request to dev (feature → dev) and main (dev → main).
# Does NOT run on direct pushes — releases are handled by release.yml.

on:
  pull_request:
    branches: [dev, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────
  # Jobs that run on ALL pull requests (to dev and to main)
  # ─────────────────────────────────────────────────────────────
  lint-frontend:
    name: Frontend Lint
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx}"

      - name: TypeScript check
        run: npx tsc -b --noEmit

  lint-rust:
    name: Rust Lint (Clippy)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssh2-1-dev libssl-dev pkg-config

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  # Lightweight compile check — catches broken builds before they reach dev.
  build-check:
    name: Build Check
    runs-on: [self-hosted, linux]
    needs: [lint-frontend, lint-rust]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssh2-1-dev libssl-dev pkg-config

      - name: Frontend build
        run: npm run build

      - name: Rust build check
        working-directory: src-tauri
        run: cargo check

  # ─────────────────────────────────────────────────────────────
  # Additional jobs that run ONLY on pull requests targeting main
  # ─────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: [self-hosted, linux]
    if: github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm run test

  test-rust:
    name: Rust Tests
    runs-on: [self-hosted, linux]
    if: github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssh2-1-dev libssl-dev pkg-config

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

  # Full Tauri build validation — only on PRs targeting main.
  # Verifies the app bundles end-to-end without creating a release.
  build-tauri:
    name: Tauri Build Validation
    runs-on: [self-hosted, linux]
    if: github.base_ref == 'main'
    needs: [build-check, test-frontend, test-rust]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssh2-1-dev libssl-dev pkg-config

      - name: Build Tauri app (validation only — no release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-unknown-linux-gnu
