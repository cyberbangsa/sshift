name: CI

on:
  push:
    branches: [main, develop, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint-and-test-frontend:
    name: Frontend Lint & Test
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx}"

      - name: TypeScript check
        run: npx tsc -b --noEmit

      - name: Unit tests
        run: npm run test

  test-rust:
    name: Rust Tests
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssh2-1-dev libssl-dev pkg-config

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
